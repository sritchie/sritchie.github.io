baseURL: "https://samritchie.io/"
languageCode: en-US
title: "Sam Ritchie"
theme: PaperMod
pagination:
  pagerSize: 10

taxonomies:
  tag: tags
  category: categories
  series: series

permalinks:
  posts: "/:slug/"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: github
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: false

params:
  defaultTheme: auto
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowToc: false
  ShowShareButtons: false
  ShowBreadCrumbs: true
  math: true
  description: "Math, code, and adventure"
  socialIcons:
    - name: github
      url: "https://github.com/sritchie"
    - name: twitter
      url: "https://twitter.com/saborichin"
    - name: rss
      url: "/index.xml"
  homeInfoParams:
    Title: "Sam Ritchie"
    Content: >
      Programmer, mathematician, adventurer. I build open-source tools for
      computational mathematics and physics, run ultramarathons, and I'm
      building an [RV-10 airplane](/projects/rv10/).


      Read my newsletter [Road to Reality](https://roadtoreality.substack.com/)
      on the mathematics of physics.
  cover:
    responsiveImages: true
    linkFullImages: false
  assets:
    disableScrollBarStyle: true

menu:
  main:
    - name: Writing
      url: /posts/
      weight: 10
    - name: Projects
      url: /projects/
      weight: 20
    - name: Talks
      url: /talks/
      weight: 30
    - name: Racing
      url: /racing/
      weight: 40
    - name: About
      url: /about/
      weight: 50
    - name: Search
      url: /search/
      weight: 60
