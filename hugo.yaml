baseURL: "https://samritchie.io/"
languageCode: en-US
title: "Sam Ritchie"
theme: PaperMod
pagination:
  pagerSize: 10

taxonomies:
  tag: tags
  category: categories
  series: series

permalinks:
  posts: "/:slug/"

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
            - - "$$"
              - "$$"
            - - "\\begin{equation}"
              - "\\end{equation}"
            - - "\\begin{equation*}"
              - "\\end{equation*}"
            - - "\\begin{align}"
              - "\\end{align}"
            - - "\\begin{align*}"
              - "\\end{align*}"
            - - "\\begin{aligned}"
              - "\\end{aligned}"
            - - "\\begin{eqalign}"
              - "\\end{eqalign}"
            - - "\\begin{gather}"
              - "\\end{gather}"
            - - "\\begin{multline}"
              - "\\end{multline}"
          inline:
            - - "$"
              - "$"
        enable: true
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: monokai
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: false

minify:
  tdewolff:
    html:
      keepWhitespace: true

params:
  comments: false
  defaultTheme: auto
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowToc: false
  ShowShareButtons: false
  ShowBreadCrumbs: true
  math: true
  description: "Math, code, and adventure"
  socialIcons:
    - name: github
      url: "https://github.com/sritchie"
    - name: email
      url: "mailto:sam@mentat.org"
    - name: substack
      title: "Road to Reality newsletter"
      url: "https://roadtoreality.substack.com/"
    - name: rss
      url: "/index.xml"
  homeInfoParams:
    Title: "Sam Ritchie"
    Content: >
      Co-Founder and CTO at [Perceptual](https://perceptual.ai/).
      Programmer, mathematician, adventurer. I build open-source tools for
      computational mathematics and physics, run ultramarathons, and I'm
      flying an [RV-10 airplane](/projects/rv10/) I built.


      [Subscribe](https://buttondown.com/samritchie) to get new posts by email.
      [Sponsor my work on GitHub.](https://github.com/sponsors/sritchie)
  cover:
    responsiveImages: true
    linkFullImages: false
  assets:
    disableScrollBarStyle: true

menu:
  main:
    - name: About
      url: /about/
      weight: 10
    - name: Blog Index
      url: /posts/
      weight: 20
    - name: Bookshelf
      url: /bookshelf/
      weight: 30
    - name: Talks
      url: /talks/
      weight: 40
    - name: Projects
      url: /projects/
      weight: 50
    - name: Adventure Resume
      url: /racing/
      weight: 60
    - name: Race Reports
      url: /tags/race-report/
      weight: 65
    - name: Search
      url: /search/
      weight: 70
