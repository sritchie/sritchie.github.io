<!-- Literata font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- Custom typography + sidenotes CSS -->
{{- $custom := resources.Get "css/custom.css" | minify }}
<link rel="stylesheet" href="{{ $custom.RelPermalink }}">

<!-- MathJax -->
{{ if or .Params.math site.Params.math }}
<script>
window.MathJax = {
  loader: {load: ['[tex]/physics']},
  tex: {
    tags: 'ams',
    processEscapes: true,
    inlineMath: [['$', '$']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    packages: {'+': ['physics']}
  },
  options: {
    renderActions: {
      findScript: [10, function (doc) {
        for (const node of document.querySelectorAll('script[type^="math/tex"]')) {
          const display = !!node.type.match(/; *mode=display/);
          const math = new doc.options.MathItem(
            node.textContent, doc.inputJax[0], display
          );
          const text = document.createTextNode('');
          node.parentNode.replaceChild(text, node);
          math.start = {node: text, delim: '', n: 0};
          math.end = {node: text, delim: '', n: 0};
          doc.math.push(math);
        }
      }, '']
    }
  }
};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
{{ end }}

<!-- GoatCounter analytics -->
<script data-goatcounter="https://samritchie.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
