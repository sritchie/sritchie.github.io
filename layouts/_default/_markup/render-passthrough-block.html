{{- $inner := .Inner -}}
{{- if strings.Contains $inner `\label` -}}
<span class="math-block">
{{ printf `<script type="math/tex; mode=display">\begin{equation}%s\end{equation}</script>` $inner | safeHTML }}
</span>
{{- else -}}
<span class="math-block">
{{ printf `<script type="math/tex; mode=display">%s</script>` $inner | safeHTML }}
</span>
{{- end -}}
